name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-template:
    name: Validate copier template
    runs-on: ubuntu-latest
    strategy:
      matrix:
        inference: [local, openrouter]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install copier
        run: pip install copier

      - name: Generate project (inference=${{ matrix.inference }})
        run: |
          copier copy . /tmp/test-project --trust \
            -d project_name="test-project" \
            -d github_repo="otixai/test-project" \
            -d default_inference="${{ matrix.inference }}" \
            -d local_model="qwen3-coder:30b" \
            -d openrouter_model="minimax/minimax-m2.5" \
            -d enable_gh_integration=true \
            -d pull_models=false

      - name: Verify .pi/ structure exists
        run: |
          set -e
          echo "Checking generated .pi/ structure..."

          # Core directories
          test -d /tmp/test-project/.pi
          test -d /tmp/test-project/.pi/extensions/oh-my-pi
          test -d /tmp/test-project/.pi/agents
          test -d /tmp/test-project/.pi/skills
          test -d /tmp/test-project/.pi/prompts
          test -d /tmp/test-project/.pi/research

          # Extension
          test -f /tmp/test-project/.pi/extensions/oh-my-pi/index.ts
          test -f /tmp/test-project/.pi/extensions/oh-my-pi/inference.ts

          # Agents
          test -f /tmp/test-project/.pi/agents/planner.md
          test -f /tmp/test-project/.pi/agents/coder.md
          test -f /tmp/test-project/.pi/agents/reviewer.md
          test -f /tmp/test-project/.pi/agents/interviewer.md
          test -f /tmp/test-project/.pi/agents/researcher.md
          test -f /tmp/test-project/.pi/agents/project-manager.md

          # Skills
          test -f /tmp/test-project/.pi/skills/deep-interview/SKILL.md
          test -f /tmp/test-project/.pi/skills/project-manager/SKILL.md
          test -f /tmp/test-project/.pi/skills/researcher/SKILL.md

          # Prompts
          test -f /tmp/test-project/.pi/prompts/autopilot.md
          test -f /tmp/test-project/.pi/prompts/deep-interview.md
          test -f /tmp/test-project/.pi/prompts/project-manager.md

          # Settings & setup
          test -f /tmp/test-project/.pi/settings.json
          test -f /tmp/test-project/.pi/models.json
          test -f /tmp/test-project/.pi/setup.sh

          echo "All required files present."

      - name: Verify template variables were rendered
        run: |
          set -e
          echo "Checking template rendering..."

          # Agent files should contain the project name
          grep -q "test-project" /tmp/test-project/.pi/agents/planner.md
          grep -q "test-project" /tmp/test-project/.pi/agents/coder.md
          grep -q "test-project" /tmp/test-project/.pi/agents/researcher.md

          # Inference config should have no unrendered Jinja
          ! grep -q '{{' /tmp/test-project/.pi/extensions/oh-my-pi/inference.ts || \
            { echo "ERROR: Unrendered Jinja tags in inference.ts"; exit 1; }

          # Agent files should have no unrendered Jinja
          for f in /tmp/test-project/.pi/agents/*.md; do
            ! grep -q '{{' "$f" || \
              { echo "ERROR: Unrendered Jinja tags in $f"; exit 1; }
          done

          # Settings should have no Jinja
          ! grep -q '{{' /tmp/test-project/.pi/settings.json || \
            { echo "ERROR: Unrendered Jinja tags in settings.json"; exit 1; }

          echo "All templates rendered correctly."

      - name: Verify models.json is valid
        run: |
          set -e
          python3 -c "import json; json.load(open('/tmp/test-project/.pi/models.json'))"
          # Check expected models are present
          grep -q "glm-4.7-flash" /tmp/test-project/.pi/models.json
          grep -q "qwen3-coder:30b" /tmp/test-project/.pi/models.json
          grep -q "minimax/minimax-m2.5" /tmp/test-project/.pi/models.json
          echo "models.json valid with expected models."

      - name: Verify setup.sh is valid bash
        run: bash -n /tmp/test-project/.pi/setup.sh

      - name: Verify TypeScript syntax
        run: |
          # Basic syntax check — ensure no obvious JS errors
          node --check /tmp/test-project/.pi/extensions/oh-my-pi/index.ts 2>&1 || \
            echo "Note: TypeScript syntax check requires pi runtime (expected in template)"
