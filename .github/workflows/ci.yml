name: Test Template Rendering

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  render-matrix:
    name: "${{ matrix.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "local / qwen3-coder:30b / gh enabled"
            copier_args: >-
              -d project_name="test-project"
              -d github_repo="otixai/test-project"
              -d default_inference="local"
              -d local_model="qwen3-coder:30b"
              -d openrouter_model="minimax/minimax-m2.5"
              -d enable_gh_integration=true
              -d pull_models=false

          - name: "local / glm-4.7-flash / gh disabled"
            copier_args: >-
              -d project_name="flash-project"
              -d github_repo=""
              -d default_inference="local"
              -d local_model="glm-4.7-flash"
              -d openrouter_model="minimax/minimax-m2.5"
              -d enable_gh_integration=false
              -d pull_models=false

          - name: "openrouter / minimax-m2.5 / gh enabled"
            copier_args: >-
              -d project_name="cloud-project"
              -d github_repo="otixai/cloud-project"
              -d default_inference="openrouter"
              -d local_model="qwen3-coder:30b"
              -d openrouter_model="minimax/minimax-m2.5"
              -d enable_gh_integration=true
              -d pull_models=false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install copier
        run: pip install copier

      - name: Render template
        run: |
          copier copy --trust --defaults \
            ${{ matrix.copier_args }} \
            . /tmp/rendered

      - name: Verify .pi/ structure
        run: |
          set -e
          echo "Checking generated .pi/ structure..."

          # Core directories
          test -d /tmp/rendered/.pi
          test -d /tmp/rendered/.pi/extensions/oh-my-pi
          test -d /tmp/rendered/.pi/agents
          test -d /tmp/rendered/.pi/skills
          test -d /tmp/rendered/.pi/prompts
          test -d /tmp/rendered/.pi/research

          # Extension
          test -f /tmp/rendered/.pi/extensions/oh-my-pi/index.ts
          test -f /tmp/rendered/.pi/extensions/oh-my-pi/inference.ts

          # Agents
          for agent in planner coder reviewer interviewer researcher project-manager; do
            test -f /tmp/rendered/.pi/agents/$agent.md
          done

          # Skills
          test -f /tmp/rendered/.pi/skills/deep-interview/SKILL.md
          test -f /tmp/rendered/.pi/skills/project-manager/SKILL.md
          test -f /tmp/rendered/.pi/skills/researcher/SKILL.md

          # Prompts
          for prompt in autopilot deep-interview project-manager review test refactor debug refine; do
            test -f /tmp/rendered/.pi/prompts/$prompt.md
          done

          # Config
          test -f /tmp/rendered/.pi/settings.json
          test -f /tmp/rendered/.pi/models.json
          test -f /tmp/rendered/.pi/setup.sh

          echo "All required files present."

      - name: Check for unrendered Jinja artifacts
        run: |
          if grep -rnE '\{%|\{\{' /tmp/rendered --include='*.md' --include='*.json' --include='*.ts'; then
            echo "::error::Unrendered Jinja tags found in output"
            exit 1
          fi
          echo "No Jinja artifacts found"

      - name: Verify models.json is valid JSON
        run: |
          python3 -c "import json; json.load(open('/tmp/rendered/.pi/models.json'))"
          grep -q "glm-4.7-flash" /tmp/rendered/.pi/models.json
          grep -q "qwen3-coder:30b" /tmp/rendered/.pi/models.json
          grep -q "minimax/minimax-m2.5" /tmp/rendered/.pi/models.json
          echo "models.json valid."

      - name: Verify setup.sh is valid bash
        run: bash -n /tmp/rendered/.pi/setup.sh

      - name: Show rendered files
        if: always()
        run: |
          echo "=== Rendered files ==="
          find /tmp/rendered -type f | sort
          echo ""
          echo "=== settings.json ==="
          cat /tmp/rendered/.pi/settings.json
          echo ""
          echo "=== inference.ts ==="
          cat /tmp/rendered/.pi/extensions/oh-my-pi/inference.ts
          echo ""
          echo "=== planner.md ==="
          cat /tmp/rendered/.pi/agents/planner.md
