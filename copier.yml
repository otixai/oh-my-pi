_min_copier_version: "9.0.0"
_subdirectory: template

project_name:
  type: str
  help: "Project name (used in prompts and agent identity)"

github_repo:
  type: str
  help: "GitHub repo in owner/repo format (for gh CLI integration)"
  default: ""

default_inference:
  type: str
  help: "Default inference backend"
  choices:
    local: "Local models (Ollama — glm-4.7-flash, qwen3-coder:30b)"
    openrouter: "OpenRouter (minimax-m2.5)"
  default: local

local_model:
  type: str
  help: "Preferred local model"
  choices:
    "qwen3-coder:30b": "Qwen3 Coder 30B MoE (reasoning + coding)"
    "glm-4.7-flash": "GLM-4.7 Flash 30B (fast general-purpose)"
  default: "qwen3-coder:30b"
  when: "{{ default_inference == 'local' }}"

openrouter_model:
  type: str
  help: "OpenRouter model identifier"
  default: "minimax/minimax-m2.5"
  when: "{{ default_inference == 'openrouter' }}"

enable_gh_integration:
  type: bool
  help: "Enable GitHub CLI integration for project management"
  default: true

pull_models:
  type: bool
  help: "Pull Ollama models after setup (requires ollama running)"
  default: true
  when: "{{ default_inference == 'local' }}"

_tasks:
  - "chmod +x .pi/setup.sh"
  - "{% if default_inference == 'local' and pull_models %}bash .pi/setup.sh{% endif %}"

_migrations:
  - version: v1
    before:
      - "echo 'Migrating oh-my-pi to latest template version...'"
    after:
      - "{% if default_inference == 'local' %}bash .pi/setup.sh{% endif %}"
